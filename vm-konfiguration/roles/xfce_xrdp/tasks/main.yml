---
- name: Alte APT-Quellen entfernen
  ansible.builtin.file:
    path: /etc/apt/sources.list
    state: absent

- name: Alte APT-Listen-Dateien entfernen
  ansible.builtin.shell: |
    find /etc/apt/sources.list.d -maxdepth 1 -type f ! -name 'debian.sources' -delete
  args:
    executable: /bin/bash
  changed_when: false

- name: Debian-Quellen im deb822-Format setzen
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/debian.sources
    mode: "0644"
    content: |
      Types: deb
      URIs: https://deb.debian.org/debian
      Suites: trixie trixie-updates
      Components: main contrib non-free-firmware
      Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg

      Types: deb
      URIs: https://security.debian.org/debian-security
      Suites: trixie-security
      Components: main contrib non-free-firmware
      Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg

- name: APT auf IPv4 erzwingen
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/99force-ipv4
    mode: "0644"
    content: |
      Acquire::ForceIPv4 "true";

- name: APT-Cache aktualisieren
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Basis-Pakete installieren
  ansible.builtin.apt:
    name: "{{ base_packages + extra_packages }}"
    state: present

- name: Unerwünschte Pakete entfernen
  ansible.builtin.apt:
    name: "{{ remove_packages }}"
    state: absent
    purge: true

- name: Gewünschte Anwendungen installieren
  ansible.builtin.apt:
    name: "{{ app_packages }}"
    state: present

- name: Zeitzone setzen
  community.general.timezone:
    name: "{{ timezone }}"

- name: Locale aktivieren
  ansible.builtin.lineinfile:
    path: /etc/locale.gen
    regexp: '^#?\\s*{{ locale | regex_escape() }}\\s+UTF-8'
    line: '{{ locale }} UTF-8'

- name: Locale generieren
  ansible.builtin.command: locale-gen
  changed_when: true

- name: Standard-Locale setzen
  ansible.builtin.copy:
    dest: /etc/default/locale
    mode: "0644"
    content: |
      LANG={{ locale }}
      LANGUAGE={{ locale.split('.')[0] }}
      LC_ALL={{ locale }}

- name: XRDP-Gruppe erstellen
  ansible.builtin.group:
    name: "{{ xrdp_allowed_group }}"
    state: present

- name: Benutzer anlegen
  ansible.builtin.user:
    name: "{{ item.name }}"
    comment: "{{ item.comment | default(item.name) }}"
    shell: "{{ item.shell | default('/bin/bash') }}"
    groups: "{{ item.groups | join(',') }}"
    append: true
    create_home: true
    password: "{{ item.password | default(omit) }}"
    state: present
  loop: "{{ desktop_users }}"

- name: XFCE-Sitzung konfigurieren
  ansible.builtin.copy:
    dest: "/home/{{ item.name }}/.xsession"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0644"
    content: |
      exec startxfce4
  loop: "{{ desktop_users }}"

- name: Desktop-Ordner erstellen
  ansible.builtin.file:
    path: "/home/{{ item.name }}/Desktop"
    state: directory
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0755"
  loop: "{{ desktop_users }}"

- name: XRDP-Port setzen
  ansible.builtin.lineinfile:
    path: /etc/xrdp/xrdp.ini
    regexp: '^port='
    line: "port={{ xrdp_port }}"
  notify: xrdp neu starten

- name: Dienste starten
  ansible.builtin.service:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - xrdp
    - xrdp-sesman
